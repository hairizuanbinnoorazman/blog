{{/* get file that matches the filename as specified as src="" in shortcode */}}
{{ $src := resources.Get (.Get "src") }}

{{ with $src }}
  {{ $medium := .Resize "1200x webp q85" }}
  <img
    src="{{ $medium.RelPermalink }}"
    width="{{ $medium.Width }}"
    height="{{ $medium.Height }}"
    {{ with $.Get "alt" }}alt="{{ . }}"{{ else }}alt=""{{ end }}
    loading="lazy"
    decoding="async">
{{ else }}
  {{ errorf "img shortcode could not find asset %q" ($.Get "src") }}
{{ end }}
